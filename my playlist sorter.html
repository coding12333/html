<html>
    <head>
        <title>My Playlist Sorter</title>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
        <style>
            body { background: lavender; }
            h1, h3 { color: darkviolet; }
            .box { background: white; color: darkviolet; }

        </style>

    </head>
    <body>
        <div class="container py-4">
             <h1 class="mb1">My Playlist Sorter</h1>
            <p class="text-muted mb-4">Sort and label your music playlist using JavaScript array methods!!</p>
            <div class="car mb-4">
                <div class="card-body".
                <h3 class="car-title">Song Names</h3>
                 <button class="btn btn-primary mr-2" onclick="sortAZ()">Sort A to Z </button>
                 <button class="btn btn-primary" onclick="sortAZ()">Sort A to Z </button>
                 <div id="nameResult" class="box p-3 mt-3 rounded"></div>


            </div>

        </div>
        <div class="card mb-4">
            <h1 class="card-body">Play Counts</h1>
            <p class="text-muted mb-4">Least Played FIRST!!</p>
            <div class="car mb-4">
                 <button class="btn btn-primary mr-2" onclick="sortMost()">Most Played FIRST!!</button>
                 <button class="btn btn-primary" onclick="sortLeast()">Least Played FIRST!!</button>
                 <div id="countResult" class="box p-3 mt-3 rounded">
                 </div>

        </div>
        <div class="card mb-4">
            <h1 class="card-body"></h1>
            <h3 class="car-title">Label EVERY Play Count</h3>
            <button class="btn btn-primary mr-2" onclick="addLabel()">Add Plays Label </button>
                 
                 <div id="labelResult" class="box p-3 mt-3 rounded">
                 </div>
                 </div>
                 </div>
                 <script>
                    var songs = ["Zoom", "Bounce", "Glow", "Rush", "Spark"]; // TOPIC 1 & 2
                    var plays = [320, 85, 210, 50, 175];

                     document.getElementById("nameResult").innerHTML = "Songs: " + songs;
                     document.getElementById("countResult").innerHTML = "Plays: " + plays;
                     document.getElementById("labelResult").innerHTML = "Press the button above!! ";
                      function sortAZ() { songs.sort();
            document.getElementById("nameResult").innerHTML = "A to Z: " + songs;}

            function sortAZ() { songs.sort();
            document.getElementById("nameResult").innerHTML = "A to Z: " + songs;}

            function sortZA() { songs.sort(); songs.reverse();
            document.getElementById("nameResult").innerHTML = "Z to A: " + songs;}

            function sortLeast() { plays.sort(function(a,b){return a-b});
            document.getElementById("countResult").innerHTML = "Least Played First: " + plays;}

            function sortMost() { plays.sort(function(a,b){return b-a});
            document.getElementById("countResult").innerHTML = "Most Played First: " + plays;} 
            
            function addLabel() { var 1 = plays.map(function(c){return c+" plays";});
            document.getElementById("labelResult").innerHTML = "Labelled";}
                 </script>
    </body>
</html>
