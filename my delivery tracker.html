<html>
    <head>
        <title>My Delivery Tracker!!</title>
        <style>
            body {
                font-family: Arial, sans-seif;
                background: aliceblue;
                text-align: canter;
                padding: 30px;

            }

            h1 {color: #ff5a43; }
            button {
                background: #ff5a43;
                color: whhite;
                padding: 10px 25px;
                border: none;
                border-radius: 20px;
                cursor: pointer;
                margin:5px
            }
            div {
                border: 1px solid #ff5a43;
                width: 280 px;
                margin: 6px auto;
                padding: 8px 12pxtext-align: left;
                border-radius: 6px;
            }

        </style>
    </head>
    <body>

        <h1>My Delivery Tracker</h1>
        <button onclick="saveOrder()">Save Order</button>
        <button onclick="startDelivery()">Start Delivery</button>

        <div>JSON text: <span id="json-text></span></div>
        <div>Loaded Item: <span id="loaded-item"></span></div>
        <div>Loaded Price: <span id="loaded-price"></span></div>
        <div>Status: <span id="status"></span></div>
        <div>Result: <span id="result"></span></div>

        <script>
            //JSON - the order stored as a JavaScript object
            let order = {
                item: "Pizza",
                price: 5,
                shop: "My Snack Shop"
            };
            function saveOrder() {
                let jsonText = JSON.stingify(order);
                let loadedOrder = JSON.parse(jsonText);

                document.getElementById("json-text").innerHTML = jsonText;
                document.getElementById("loaded-item").innerHTML = loadedOrder.item;
                document.getElementById("loaded-price").innerHTML = "$" + loadedOrder.price;

        }

         

        function delay(ms) {
            return new Promise(function(resolve) {
                setTimeout(resolve, ms);
            });
        }
        async function startDelivery() {
            document.getElementById("result")inner.HTML = "";

            document.getElementById("status").innerHTML = "Order Recieved!";
            setTimeout(function() {
            document.getElementById("status").innerHTML = "Kitchen is preparing..."; }, 1000);

            await delay(3000);
            document.getElementById("status").innerHTML = "out for delivery!";

            await delay(2000);
            document.getElementById("result").innerHTML = "ur order has arrived!";
            
  
            
        
        }
    
        </script>
    </body>
</html>
